<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Courses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container mt-5">
    <h2>Course List</h2>
    <form th:action="@{/courses}" th:object="${course}" method="post" class="mb-3">
        <input type="text" th:field="*{code}" placeholder="Course Code" class="form-control mb-2"/>
        <input type="text" th:field="*{title}" placeholder="Course Title" class="form-control mb-2"/>
        <button type="submit" class="btn btn-primary">Add Course</button>
    </form>
    <table class="table table-striped">
        <thead><tr><th>ID</th><th>Code</th><th>Title</th></tr></thead>
        <tbody>
            <tr th:each="c : ${courses}">
                <td th:text="${c.id}">1</td>
                <td th:text="${c.code}">C101</td>
                <td th:text="${c.title}">Math</td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
